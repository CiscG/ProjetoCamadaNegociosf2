spring.application.name=travel-agency
spring.profiles.active=dev

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/travel_agency
spring.data.mongodb.auto-index-creation=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.travelagency=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Application Info
spring.application.display-name=Travel Agency - Sistema de Gerenciamento de Viagens
